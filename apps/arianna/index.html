<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Arianna Morjan — QR codes, pink, and fun." />
    <title>Arianna · Morjan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="dots" aria-hidden="true"></div>
    <main class="stage">
      <p class="eyebrow">Arianna · age 5</p>
      <h1 class="brand">Scan me!</h1>
      <p class="lead">
        Arianna’s pink QR-code laboratory is under construction.
        She loves squares that open magic links.
      </p>
      <div class="qr-card">
        <div id="qrcode" class="qrcode" aria-label="QR code for Arianna’s site"></div>
        <p class="qr-caption">arianna.morjan.family</p>
      </div>
      <p class="host" id="hostLabel"></p>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
