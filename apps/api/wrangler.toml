# Upload API for trips.morjan.family
# Domain: api.morjan.family
#
# First-time:
#   npx wrangler d1 create morjan-catalog
#   → paste database_id below
#   npx wrangler d1 migrations apply morjan-catalog --remote
#   npx wrangler deploy
#   then put secrets (see README.md)

name = "morjan-api"
main = "src/index.js"
compatibility_date = "2026-07-17"

# Custom domain (zone morjan.family). Deploy creates the domain + DNS automatically.
[[routes]]
pattern = "api.morjan.family"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "morjan-catalog"
# Paste the id from: npx wrangler d1 create morjan-catalog
database_id = "43da9c01-39be-4f6b-a6d7-bd22589a3133"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "morjan-trips"

# Resize/compress web copies (max edge 2048, JPEG q80). Billed as Images transformations.
[images]
binding = "IMAGES"

[vars]
MEDIA_PUBLIC_BASE = "https://media.morjan.family"
ALLOWED_ORIGIN = "https://trips.morjan.family"
